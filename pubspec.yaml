name: dairy
description: "A beautifully cinematic, fully offline, and 100% free diary app."
version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  flutter_animate: ^4.5.2
  google_fonts: ^8.0.2
  image_picker: ^1.2.1
  intl: ^0.20.2
  path_provider: ^2.1.5
  provider: ^6.1.5+1
  share_plus: ^12.0.1
  shared_preferences: ^2.5.4
  uuid: ^4.5.3
  google_mlkit_text_recognition: ^0.14.0
  supabase_flutter: ^2.12.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1
  rename: ^3.1.0

flutter_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"

flutter:
  uses-material-design: true
